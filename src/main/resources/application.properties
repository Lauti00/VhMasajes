spring.application.name=app

# PORT CONFIGURATION
# Render asigna un puerto dinámico; si no existe, usa el 8083 por defecto.
server.port=${PORT:8083}

# DATABASE CONFIGURATION (PostgreSQL - Supabase)
# Usamos variables de entorno para no exponer credenciales en GitHub
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE SETTINGS
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 CONSOLE (Solo para pruebas locales)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# LOGGING
logging.level.root=INFO
logging.level.com.masajes=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT SECURITY
# Es fundamental que 'jwt.secret' también sea una variable en Render en el futuro
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-with-at-least-32-chars-xxxxxxx}
jwt.expiration=86400000

# CORS CONFIGURATION
cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://vhmasajes.onrender.com
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# SWAGGER / OPENAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true